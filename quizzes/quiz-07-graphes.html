<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 07 — Graphes et Parcours</title>
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s ease}.progress-text{text-align:center;font-size:.9rem;color:#8892b0;margin-bottom:1.5rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.6rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type="radio"]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn:active{transform:scale(.97)}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-restart{background:#0d6efd;color:#fff;margin-top:1rem}.btn-restart:hover{background:#3b82f6}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}</style>
</head>
<body>
  <div class="container">
    <h1>Quiz 07 — Graphes et Parcours</h1>
    <p class="subtitle">Modélisation et exploration de graphes</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quelle représentation de graphe est la plus adaptée pour un graphe <strong>creux</strong> (sparse) avec V sommets et très peu d'arêtes ?",
        code: null,
        options: [
          "Matrice d'adjacence — O(V²) en espace",
          "Liste d'adjacence — O(V + E) en espace",
          "Les deux sont équivalentes en espace pour un graphe creux",
          "Matrice d'incidence — O(V × E) en espace"
        ],
        answer: 1,
        explanation: "Pour un graphe creux, E ≪ V². La liste d'adjacence utilise O(V + E) en espace, bien plus efficace que la matrice d'adjacence qui utilise toujours O(V²). La matrice d'adjacence est préférable quand le graphe est dense ou qu'on a besoin de vérifier l'existence d'une arête en O(1)."
      },
      {
        label: "Prédiction de code",
        text: "Quel est l'ordre de visite BFS en partant du sommet <strong>0</strong> dans ce graphe (en choisissant les voisins dans l'ordre croissant) ?",
        code: "const graph = {\n  0: [1, 2],\n  1: [0, 3],\n  2: [0, 3, 4],\n  3: [1, 2],\n  4: [2]\n};\n\nfunction bfs(start) {\n  const visited = new Set([start]);\n  const queue = [start];\n  const order = [];\n  while (queue.length > 0) {\n    const node = queue.shift();\n    order.push(node);\n    for (const neighbor of graph[node]) {\n      if (!visited.has(neighbor)) {\n        visited.add(neighbor);\n        queue.push(neighbor);\n      }\n    }\n  }\n  return order;\n}\nconsole.log(bfs(0));",
        options: [
          "[0, 1, 2, 3, 4]",
          "[0, 2, 1, 4, 3]",
          "[0, 1, 3, 2, 4]",
          "[0, 2, 4, 1, 3]"
        ],
        answer: 0,
        explanation: "BFS explore niveau par niveau. Depuis 0, on visite les voisins [1, 2]. Depuis 1, le voisin non visité est 3. Depuis 2, le voisin non visité est 4 (3 est déjà visité). Résultat : [0, 1, 2, 3, 4]."
      },
      {
        label: "Concept",
        text: "Le tri topologique n'est applicable que dans quel type de graphe ?",
        code: null,
        options: [
          "Tout graphe connexe",
          "Un graphe non orienté sans cycle",
          "Un graphe orienté acyclique (DAG)",
          "Un graphe pondéré sans poids négatif"
        ],
        answer: 2,
        explanation: "Le tri topologique produit un ordre linéaire des sommets tel que pour chaque arête u → v, u apparaît avant v. Cela n'est possible que dans un DAG (Directed Acyclic Graph). Si le graphe contient un cycle, aucun ordre topologique n'existe."
      },
      {
        label: "Prédiction de code",
        text: "Que retourne cette fonction de détection de cycle par DFS 3 couleurs sur le graphe donné ?",
        code: "const graph = { 0: [1], 1: [2], 2: [0] };\n\nfunction hasCycle(graph) {\n  const WHITE = 0, GRAY = 1, BLACK = 2;\n  const color = {};\n  for (const node in graph) color[node] = WHITE;\n\n  function dfs(u) {\n    color[u] = GRAY;\n    for (const v of graph[u]) {\n      if (color[v] === GRAY) return true;\n      if (color[v] === WHITE && dfs(v)) return true;\n    }\n    color[u] = BLACK;\n    return false;\n  }\n\n  for (const node in graph) {\n    if (color[node] === WHITE && dfs(node)) return true;\n  }\n  return false;\n}\nconsole.log(hasCycle(graph));",
        options: [
          "false — aucun cycle détecté",
          "true — le cycle 0 → 1 → 2 → 0 est détecté",
          "Erreur : stack overflow",
          "undefined — la fonction ne retourne rien"
        ],
        answer: 1,
        explanation: "Le graphe contient le cycle 0 → 1 → 2 → 0. Lors du DFS depuis 0, on colore 0 en GRAY, puis 1, puis 2. Quand on explore le voisin 0 de 2, on le trouve GRAY, ce qui indique un cycle. La fonction retourne true."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi BFS garantit-il de trouver le <strong>plus court chemin</strong> dans un graphe non pondéré ?",
        code: null,
        options: [
          "Parce que BFS utilise une pile qui trie les sommets par distance",
          "Parce que BFS explore tous les sommets à distance d avant ceux à distance d+1, grâce à la file FIFO",
          "Parce que BFS visite chaque arête exactement deux fois",
          "Parce que BFS est plus rapide que DFS"
        ],
        answer: 1,
        explanation: "BFS utilise une file (FIFO) qui garantit que tous les sommets à distance d de la source sont traités avant ceux à distance d+1. Ainsi, la première fois qu'un sommet est atteint, c'est forcément par un chemin de longueur minimale. Cela ne fonctionne que si toutes les arêtes ont le même poids (graphe non pondéré)."
      }
    ];
    let currentQuestion=0,score=0,answered=false;
    function renderQuestion(){answered=false;const q=questions[currentQuestion];document.getElementById('progressBar').style.width=(currentQuestion/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} / ${questions.length}`;let html=`<div class="card"><p class="question-label">${q.label} — Question ${currentQuestion+1}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q${currentQuestion}" value="${i}"><span>${opt}</span></label></li>`;});html+=`</ul><div style="margin-top:1rem;"><button class="btn btn-primary" id="validateBtn" onclick="validate()">Valider</button></div><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizContainer').innerHTML=html;}
    function validate(){if(answered){currentQuestion++;if(currentQuestion<questions.length)renderQuestion();else showScore();return;}const selected=document.querySelector(`input[name="q${currentQuestion}"]:checked`);if(!selected)return;answered=true;const val=parseInt(selected.value),q=questions[currentQuestion],fb=document.getElementById('feedback');document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r=>r.disabled=true);if(val===q.answer){score++;fb.className='feedback correct';fb.innerHTML=`<strong>✅ Correct !</strong><br>${q.explanation}`;}else{fb.className='feedback wrong';fb.innerHTML=`<strong>❌ Incorrect</strong> — Bonne réponse : <em>${q.options[q.answer]}</em><br><br>${q.explanation}`;}document.getElementById('validateBtn').textContent=currentQuestion<questions.length-1?'Suivant':'Voir le score';}
    function showScore(){document.getElementById('quizContainer').classList.add('hidden');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent='Terminé !';const sc=document.getElementById('scoreContainer');sc.classList.remove('hidden');sc.innerHTML=`<div class="score">Score : ${score} / ${questions.length}</div><p class="score-label">${score===questions.length?'Parfait !':score>=3?'Bon travail !':'Continuez à étudier !'}</p><button class="btn btn-restart" onclick="restart()">Recommencer</button>`;}
    function restart(){currentQuestion=0;score=0;document.getElementById('scoreContainer').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');renderQuestion();}
    renderQuestion();
  </script>
</body>
</html>
