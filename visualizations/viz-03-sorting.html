<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualisation — Tri (Bubble, Merge, Quick)</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}
    .container{max-width:900px;margin:0 auto}
    h1{text-align:center;margin-bottom:.5rem;color:#fff}
    .subtitle{text-align:center;color:#8892b0;margin-bottom:1.5rem}
    canvas{background:#0d1117;border-radius:12px;border:1px solid #30363d;display:block;margin:0 auto 1rem}
    .controls{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
    .btn{padding:.6rem 1.5rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
    .btn-primary{background:#0d6efd;color:#fff}
    .btn-primary:hover{background:#3b82f6}
    .btn-active{background:#198754;color:#fff}
    .btn-secondary{background:#374151;color:#e0e0e0}
    .btn-secondary:hover{background:#4b5563}
    .stats{text-align:center;color:#8892b0;font-size:.9rem;margin-bottom:1rem}
    .speed-control{display:flex;gap:.5rem;align-items:center;justify-content:center;margin-bottom:1rem}
    .speed-control input{width:150px;accent-color:#4dabf7}
  </style>
</head>
<body>
  <div class="container">
    <h1>Visualisation des algorithmes de tri</h1>
    <p class="subtitle">Comparez Bubble Sort, Merge Sort et Quick Sort en temps réel</p>
    <div class="controls">
      <button class="btn btn-primary" onclick="start('bubble')">Bubble Sort</button>
      <button class="btn btn-primary" onclick="start('merge')">Merge Sort</button>
      <button class="btn btn-primary" onclick="start('quick')">Quick Sort</button>
      <button class="btn btn-secondary" onclick="shuffle()">🔄 Mélanger</button>
    </div>
    <div class="speed-control">
      <span>Vitesse:</span>
      <input type="range" id="speed" min="1" max="50" value="10">
      <span id="speedLabel">10ms</span>
    </div>
    <p class="stats" id="stats">Comparaisons: 0 | Échanges: 0</p>
    <canvas id="canvas" width="860" height="400"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const N = 80;
    let arr = [], comparing = [-1, -1], swapping = [-1, -1], sorted = new Set();
    let comparisons = 0, swaps = 0, running = false;

    function initArray() {
      arr = Array.from({length: N}, (_, i) => i + 1);
      shuffle();
    }

    function shuffle() {
      if (running) return;
      sorted.clear(); comparing = [-1,-1]; swapping = [-1,-1]; comparisons = 0; swaps = 0;
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      updateStats(); draw();
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      const barW = (W - 20) / N;
      const maxH = H - 20;

      for (let i = 0; i < N; i++) {
        const h = (arr[i] / N) * maxH;
        const x = 10 + i * barW;
        const y = H - 10 - h;

        if (i === comparing[0] || i === comparing[1]) ctx.fillStyle = '#ef4444';
        else if (i === swapping[0] || i === swapping[1]) ctx.fillStyle = '#eab308';
        else if (sorted.has(i)) ctx.fillStyle = '#22c55e';
        else ctx.fillStyle = '#4dabf7';

        ctx.fillRect(x, y, barW - 1, h);
      }
    }

    function updateStats() {
      document.getElementById('stats').textContent = `Comparaisons: ${comparisons} | Échanges: ${swaps}`;
    }

    function delay() {
      return new Promise(r => setTimeout(r, 51 - parseInt(document.getElementById('speed').value)));
    }

    document.getElementById('speed').addEventListener('input', function() {
      document.getElementById('speedLabel').textContent = (51 - this.value) + 'ms';
    });

    async function start(algo) {
      if (running) return;
      running = true; comparisons = 0; swaps = 0; sorted.clear();
      if (algo === 'bubble') await bubbleSort();
      else if (algo === 'merge') await mergeSort(0, arr.length - 1);
      else if (algo === 'quick') await quickSort(0, arr.length - 1);
      for (let i = 0; i < N; i++) sorted.add(i);
      comparing = [-1,-1]; swapping = [-1,-1]; draw(); running = false;
    }

    async function bubbleSort() {
      for (let i = 0; i < N - 1; i++) {
        for (let j = 0; j < N - 1 - i; j++) {
          comparing = [j, j+1]; comparisons++; updateStats(); draw(); await delay();
          if (arr[j] > arr[j+1]) {
            swapping = [j, j+1]; swaps++;
            [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
            updateStats(); draw(); await delay(); swapping = [-1,-1];
          }
        }
        sorted.add(N - 1 - i);
      }
      sorted.add(0);
    }

    async function mergeSort(lo, hi) {
      if (lo >= hi) return;
      const mid = Math.floor((lo + hi) / 2);
      await mergeSort(lo, mid);
      await mergeSort(mid + 1, hi);
      await merge(lo, mid, hi);
    }

    async function merge(lo, mid, hi) {
      const temp = arr.slice(lo, hi + 1);
      let i = 0, j = mid - lo + 1, k = lo;
      while (i <= mid - lo && j <= hi - lo) {
        comparing = [lo + i, lo + j]; comparisons++; updateStats(); draw(); await delay();
        if (temp[i] <= temp[j]) { arr[k++] = temp[i++]; }
        else { arr[k++] = temp[j++]; swaps++; }
        updateStats(); draw();
      }
      while (i <= mid - lo) { arr[k++] = temp[i++]; draw(); await delay(); }
      while (j <= hi - lo) { arr[k++] = temp[j++]; draw(); await delay(); }
    }

    async function quickSort(lo, hi) {
      if (lo >= hi) return;
      const pivot = arr[hi];
      let i = lo;
      for (let j = lo; j < hi; j++) {
        comparing = [j, hi]; comparisons++; updateStats(); draw(); await delay();
        if (arr[j] < pivot) {
          swapping = [i, j]; swaps++;
          [arr[i], arr[j]] = [arr[j], arr[i]];
          updateStats(); draw(); await delay(); swapping = [-1,-1]; i++;
        }
      }
      [arr[i], arr[hi]] = [arr[hi], arr[i]]; swaps++;
      sorted.add(i); updateStats(); draw(); await delay();
      await quickSort(lo, i - 1);
      await quickSort(i + 1, hi);
    }

    initArray();
  </script>
</body>
</html>
